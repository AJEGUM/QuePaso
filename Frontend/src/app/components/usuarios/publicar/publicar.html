<div class="flex items-end gap-3 w-full">
  <textarea
    [(ngModel)]="contenido"
    #txtArea
    (input)="autoCrescer(txtArea)"
    rows="1"
    placeholder="Escribe tu mensaje anónimo aquí..."
    [className]="isDarkMode()
      ? 'flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 text-sm resize-none max-h-32 transition-all duration-75'
      : 'flex-1 bg-slate-100 border border-slate-300 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm resize-none max-h-32 transition-all duration-75'"
  ></textarea>

  <button
    (click)="enviarMensaje(); resetearAltura(txtArea)"
    [disabled]="cargando() || !contenido().trim()"
    class="bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 disabled:from-slate-300 disabled:to-slate-300 disabled:text-slate-500 dark:disabled:from-slate-800 dark:disabled:to-slate-800 dark:disabled:text-slate-600 text-white font-bold h-11 px-5 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-[0.95]"
  >
    @if (cargando()) {
      <div class="w-4 h-4 border-2 border-slate-400 border-t-white rounded-full animate-spin"></div>
    } @else {
      <span>Soltar</span>
    }
  </button>
</div>
