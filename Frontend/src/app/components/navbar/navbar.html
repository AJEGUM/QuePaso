<div [className]="isDarkMode() 
     ? 'bg-slate-900/60 border-b border-slate-800 p-4 sticky top-0 z-40 backdrop-blur' 
     : 'bg-white/60 border-b border-slate-200 p-4 sticky top-0 z-40 backdrop-blur'">
  
  <div class="max-w-4xl mx-auto flex flex-col sm:flex-row sm:items-center justify-between gap-3 relative">
    
    <div>
      <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
        ¿Qué pasó?
      </h1>
      <p class="text-[11px] text-slate-400 dark:text-slate-500">
        Muro de mensajes efímeros y completamente anónimos.
      </p>
    </div>
    
    <div class="flex items-center gap-3 self-end sm:self-auto">
      
      @if (respuestaExito()) {
        <span class="text-emerald-400 text-xs font-medium animate-pulse bg-emerald-500/10 px-3 py-1 rounded-lg border border-emerald-500/20">
          🚀 ¡Lanzado al vacío!
        </span>
      }
      
      @if (errorMsg()) {
        <span class="text-rose-400 text-xs font-medium bg-rose-500/10 px-3 py-1 rounded-lg border border-rose-500/20">
          ⚠️ {{ errorMsg() }}
        </span>
      }

      <button (click)="onToggleTheme.emit()" 
              class="p-2 rounded-xl border transition-all text-xs font-semibold uppercase tracking-wider
                     border-slate-200 bg-white text-slate-700 hover:bg-slate-100 
                     dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
        {{ isDarkMode() ? '☀️ Claro' : '🌙 Oscuro' }}
      </button>

    </div>
  </div>
</div>
