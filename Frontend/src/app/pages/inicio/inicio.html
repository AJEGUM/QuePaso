<div [className]="isDarkMode() 
     ? 'min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center justify-center p-4 transition-colors duration-300' 
     : 'min-h-screen bg-slate-50 text-slate-900 flex flex-col items-center justify-center p-4 transition-colors duration-300'">
  
  <button (click)="toggleTheme()" 
          class="absolute top-4 right-4 p-2 rounded-xl border transition-all text-sm font-medium
                 border-slate-300 bg-white text-slate-700 hover:bg-slate-100 
                 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800">
    {{ isDarkMode() ? 'Modo Claro' : 'Modo Oscuro' }}
  </button>

  <div [className]="isDarkMode()
       ? 'w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-4'
       : 'w-full max-w-md bg-white border border-slate-200 rounded-2xl p-6 shadow-xl space-y-4'">
    
    <div class="text-center">
      <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-indigo-500 to-cyan-500 bg-clip-text text-transparent">
        ¿Qué pasó?
      </h1>
    </div>

    <div class="space-y-3">
      <textarea
        [(ngModel)]="contenido"
        rows="3"
        placeholder="Escribe tu mensaje anónimo aquí..."
        [className]="isDarkMode()
          ? 'w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 text-sm resize-none'
          : 'w-full bg-slate-100 border border-slate-300 rounded-xl p-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-indigo-500 text-sm resize-none'"
      ></textarea>

      <button
        (click)="enviarMensaje()"
        [disabled]="cargando() || !contenido().trim()"
        class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 disabled:from-slate-300 disabled:to-slate-300 disabled:text-slate-500 dark:disabled:from-slate-800 dark:disabled:to-slate-800 dark:disabled:text-slate-600 text-white font-medium py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-[0.98]"
      >
        @if (cargando()) {
          <span>Publicando...</span>
        } @else {
          <span>Soltar Mensaje</span>
        }
      </button>
    </div>

    @if (respuestaExito()) {
      <div class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 dark:text-emerald-400 rounded-xl p-3 text-xs text-center font-medium">
        🚀 ¡Mensaje lanzado al vacío con éxito!
      </div>
    }

    @if (errorMsg()) {
      <div class="bg-rose-500/10 border border-rose-500/20 text-rose-500 dark:text-rose-400 rounded-xl p-3 text-xs text-center font-medium">
        ⚠️ {{ errorMsg() }}
      </div>
    }

  </div>
</div>
