<div class="min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center justify-center p-4">
  
  <div class="w-full max-w-lg bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl space-y-6">
    
    <div class="text-center space-y-1">
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
        ¿Qué pasó?
      </h1>
      <p class="text-sm text-slate-400">
        Suelta tu mensaje. Desaparecerá de la faz de la tierra automáticamente.
      </p>
    </div>

    <div class="space-y-4">
      
      <div class="space-y-2">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">
          Tu <span class="text-indigo-400">Mensaje Secreto</span>
        </label>
        <textarea
          [(ngModel)]="contenido"
          rows="4"
          placeholder="Escribe de forma anónima lo que está pasando..."
          class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition resize-none text-sm"
        ></textarea>
      </div>

      <div class="space-y-2">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider flex justify-between">
          <span>Tiempo de vida en el aire</span>
          <span class="text-indigo-400 font-bold">{{ horasVisibilidad() }} {{ horasVisibilidad() === 1 ? 'hora' : 'horas' }}</span>
        </label>
        <input 
          type="range" 
          min="1" 
          max="24" 
          [value]="horasVisibilidad()"
          (input)="actualizarHoras($event)"
          class="w-full h-2 bg-slate-950 rounded-lg appearance-none cursor-pointer accent-indigo-500 border border-slate-800"
        />
        <div class="flex justify-between text-[10px] text-slate-500 px-1">
          <span>1 hora</span>
          <span>12 horas</span>
          <span>24 horas</span>
        </div>
      </div>

      <button
        (click)="enviarMensaje()"
        [disabled]="cargando() || !contenido().trim()"
        class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-600 text-white font-medium py-3 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/10 active:scale-[0.98]"
      >
        @if (cargando()) {
          <div class="w-5 h-5 border-2 border-slate-400 border-t-white rounded-full animate-spin"></div>
          <span>Publicando...</span>
        } @else {
          <span>Soltar Mensaje</span>
        }
      </button>

    </div>

    @if (respuestaExito()) {
      <div class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl p-4 text-xs space-y-1">
        <p class="font-bold flex items-center gap-1">
          <span>🚀</span> ¡Mensaje lanzado al vacío!
        </p>
        <p class="text-slate-400">ID: <span class="font-mono text-[11px] text-slate-300">{{ respuestaExito()?.id }}</span></p>
        <p class="text-slate-400">Expira el: <span class="text-slate-300 font-medium">{{ respuestaExito()?.expira_en }}</span></p>
      </div>
    }

    @if (errorMsg()) {
      <div class="bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl p-4 text-xs font-medium flex items-center gap-2">
        <span>⚠️</span> {{ errorMsg() }}
      </div>
    }

  </div>
</div>
